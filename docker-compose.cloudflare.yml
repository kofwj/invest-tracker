name: invest-tracker-cloudflare

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      DB_PATH: ${DB_PATH:-/app/data/invest.db}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
