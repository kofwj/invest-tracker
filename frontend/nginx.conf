server {
    listen 80;
    server_name localhost;

    # Force UTF-8 for HTML/CSS/JS so Chinese login copy never mojibakes.
    charset utf-8;
    charset_types
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Prefer explicit MIME types with charset where browsers care most.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    types {
        text/html                             html htm shtml;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/svg+xml                         svg svgz;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Never let stale HTML/JS keep old login markup.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Avoid manually setting Content-Type here; charset utf-8 above is enough and
        # prevents duplicate Content-Type headers that confuse some browsers.
        try_files /index.html =404;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Charset utf-8;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
