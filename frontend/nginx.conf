server {
    listen 80;
    server_name localhost;

    # Ensure browsers treat HTML/JS/CSS as UTF-8 (avoids mojibake for Chinese login copy).
    charset utf-8;
    charset_types text/css application/javascript application/json text/plain text/xml application/xml;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # pass through backend utf-8 json
        proxy_set_header Accept-Charset utf-8;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Content-Type "text/html; charset=utf-8";
        charset utf-8;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
