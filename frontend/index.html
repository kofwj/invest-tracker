<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>投资资产管理系统</title>
    <!-- 登录页中文字体：不依赖服务器本地字体，避免 Linux/VPS 浏览器显示为方框 -->
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      /* Critical login styles inlined so Chinese remains readable even if CSS bundle fails */
      html, body { margin: 0; background: #f5f7fa; color: #303133;
        font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .login-overlay { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #eef3f9 0%, #f7f8fa 45%, #e9eef5 100%); filter: none !important; }
      .login-box { width: min(400px, calc(100vw - 32px)); padding: 36px 32px 28px; background: #fff; border-radius: 16px;
        box-shadow: 0 18px 50px rgba(15,23,42,.12); border: 1px solid #ebeef5; text-align: center; color: #303133; filter: none !important; }
      .login-logo { width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #409eff, #66b1ff); color: #fff; font-size: 22px; font-weight: 700; }
      .login-box h3 { margin: 0; font-size: 20px; font-weight: 700; }
      .login-subtitle { margin: 8px 0 0; font-size: 13px; color: #909399; }
      .login-field { text-align: left; margin-bottom: 16px; }
      .login-field-label { display: block; margin-bottom: 6px; font-size: 13px; color: #606266; }
      .login-native-input { width: 100%; height: 42px; padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 8px;
        font-size: 14px; font-family: inherit; box-sizing: border-box; color: #303133; background: #fff; }
      .login-native-button { width: 100%; height: 42px; border: 0; border-radius: 8px; background: #409eff; color: #fff;
        font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
      .login-native-button:disabled { background: #a0cfff; cursor: not-allowed; }
      .login-error { min-height: 18px; margin: 0 0 12px; font-size: 13px; color: #f56c6c; text-align: left; }
      /* Keep login sharp even if privacy mask is on the document */
      html.screenshot-mask .login-overlay,
      html.screenshot-mask .login-overlay * { filter: none !important; -webkit-filter: none !important; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
