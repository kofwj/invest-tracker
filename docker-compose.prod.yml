name: invest-tracker-prod

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      DB_PATH: ${DB_PATH:-/app/data/invest.db}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped


  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    command:
      - --http-address=0.0.0.0:4180
      - --provider=github
      - --client-id=${GITHUB_OAUTH_CLIENT_ID:-replace-with-github-oauth-client-id}
      - --client-secret=${GITHUB_OAUTH_CLIENT_SECRET:-replace-with-github-oauth-client-secret}
      - --redirect-url=https://${APP_DOMAIN:-invest.example.com}/oauth2/callback
      - --github-user=${GITHUB_OAUTH_ALLOWED_USER:-your-github-username}
      - --email-domain=*
      - --upstream=static://202
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-user-headers=true
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-replace-with-32-byte-base64-secret}
      - --cookie-secure=true
      - --cookie-samesite=lax
      - --cookie-expire=168h
      - --cookie-refresh=1h
      - --skip-provider-button=true
    expose:
      - "4180"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-invest.example.com}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    depends_on:
      frontend:
        condition: service_started
      oauth2-proxy:
        condition: service_started
    restart: unless-stopped
